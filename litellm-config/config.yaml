model_list:
  # LiteLLM expects timeout/retry values as YAML numbers here. Do not use
  # os.environ/VAR for these numeric fields unless LiteLLM starts casting them;
  # otherwise some async paths compare strings to ints.
  # Small fallback model. Ollama's OpenAI-compatible /v1 API is used because
  # it responds quickly and avoids provider-specific Ollama hangs in LiteLLM.
  - model_name: edge-gemma
    litellm_params:
      model: os.environ/EDGE_GEMMA_LITELLM_MODEL
      api_base: os.environ/EDGE_GEMMA_API_BASE
      api_key: os.environ/LOCAL_LLM_API_KEY
      timeout: 60
      stream_timeout: 15
      max_retries: 0

  # Main large model on the llama.cpp server.
  - model_name: big-boss
    litellm_params:
      model: os.environ/BIG_BOSS_LITELLM_MODEL
      api_base: os.environ/BIG_BOSS_API_BASE
      api_key: os.environ/LOCAL_LLM_API_KEY
      timeout: 180
      stream_timeout: 30
      max_retries: 0

  # Optional embedding route for AlphaRavis pgvector memory.
  # Keep ALPHARAVIS_VECTOR_BACKEND=off until this model exists on the target
  # backend. Primary target: gte-qwen2-1.5b-instruct on the dedicated Ollama node.
  - model_name: memory-embed
    litellm_params:
      model: os.environ/EMBEDDING_LITELLM_MODEL
      api_base: os.environ/EMBEDDING_API_BASE
      api_key: os.environ/LOCAL_LLM_API_KEY
      timeout: 30
      max_retries: 0

  # Smaller embedding fallback if the primary Qwen embedding route has trouble.
  - model_name: memory-embed-fallback
    litellm_params:
      model: os.environ/EMBEDDING_FALLBACK_LITELLM_MODEL
      api_base: os.environ/EMBEDDING_API_BASE
      api_key: os.environ/LOCAL_LLM_API_KEY
      timeout: 30
      max_retries: 0

litellm_settings:
  num_retries: 0
  request_timeout: 180
