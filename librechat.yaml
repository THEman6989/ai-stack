version: 1.0.8
endpoints:
  custom:
    - name: "LangGraph Agent"
      apiKey: "sk-1234" # Dummy Key
      baseURL: "http://api-bridge:8123/v1"
      models:
        default: ["my-agent"]
        fetch: false
    - name: "Hermes Agent"
      apiKey: "${HERMES_API_KEY}"
      baseURL: "${HERMES_API_BASE}"
      models:
        default: ["${HERMES_MODEL}"]
        fetch: false
