services:
  # --- DATENBANKEN ---
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017" # Debugging-Port für MongoDB Compass
    volumes:
      - ./librechat-data/db:/data/db
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"try { rs.status().ok } catch (e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}).ok }\" | grep 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 10s
    restart: always
    

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379" # Debugging-Port für Redis
    #volumes:
      #- ./librechat-data/redis:/data
    env_file:
      - .env
    restart: always
    #command: redis-server --save 60 1 --loglevel warning

  # --- DATENBANKEN ---
  vectordb:
    image: ankane/pgvector:latest
    container_name: vectordb
    environment:
      - POSTGRES_DB=rag_api
      - POSTGRES_USER=postgres
      # Hier wird die Variable aus deiner .env eingesetzt
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./data/pgdata:/var/lib/postgresql/data
    env_file:
      - .env
    restart: always

  # --- KI INFRASTRUKTUR ---
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@vectordb:5432/rag_api
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-local-dev}
      - EMBEDDING_LITELLM_MODEL=${EMBEDDING_LITELLM_MODEL:-openai/Q78KG/gte-Qwen2-1.5B-instruct}
      - EMBEDDING_FALLBACK_LITELLM_MODEL=${EMBEDDING_FALLBACK_LITELLM_MODEL:-openai/bge-m3}
      - EMBEDDING_API_BASE=${EMBEDDING_API_BASE:-http://192.168.178.140:11434/v1}
      - EMBEDDING_TIMEOUT_SECONDS=${EMBEDDING_TIMEOUT_SECONDS:-30}
    env_file:
      - .env
    volumes:
      - ./litellm-config/config.yaml:/app/config.yaml
    ports:
      - "4000:4000"
    command: [ "--config", "/app/config.yaml", "--port", "4000" ]
    restart: always

  rag_api:
    build:
      context: ./rag-api-repo
      dockerfile: Dockerfile
    container_name: rag_api
    environment:
      - VECTOR_DB_TYPE=pgvector
      - DB_HOST=vectordb
      - DB_PORT=5432
      - POSTGRES_DB=rag_api
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - RAG_OPENAI_API_KEY=any-string
      - RAG_OPENAI_BASEURL=http://litellm:4000
    depends_on:
      - vectordb
      - litellm
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: always

  # --- DER BRAIN (AlphaRavis LangGraph API) ---
  langgraph-api:
    build:
      context: .
      dockerfile: ./langgraph-app/Dockerfile
    container_name: langgraph-api
    command: ["sh", "-c", "rm -f /tmp/.X0-lock && Xvfb :0 -screen 0 1280x720x24 & fluxbox & x11vnc -display :0 -forever -nopw -listen 0.0.0.0 & cd /workspace/langgraph-app && langgraph dev --config langgraph.json --host 0.0.0.0 --port 2024 --no-browser"]
    ports:
      - "2024:2024"
      - "5900:5900" # VNC Port für die Sandbox
      # --- NEU: LangGraphics Ports freigeben ---
      - "8760:8760" # Research UI
      - "8762:8762" # General UI
      - "8764:8764" # Computer/CUA UI
      - "8766:8766" # Debugger UI
      - "8768:8768" # Main Supervisor UI
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./langgraph-app:/app
      - ./langchain-bridge-repo/langchain_fastapi_chat_completion:/app/langchain_fastapi_chat_completion
      - ./local-deep-researcher-repo:/app/local_deep_researcher
      - ./:/workspace # WICHTIG: Die Sandbox braucht Zugriff auf deine Files zum Coden!
    environment:
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - OPENAI_API_BASE=http://litellm:4000/v1
      - OPENAI_API_KEY=${LITELLM_MASTER_KEY:-sk-local-dev}
      - PIXELLE_URL=${PIXELLE_URL:-http://pixelle:9004}
      - HERMES_API_BASE=${HERMES_API_BASE:-http://host.docker.internal:8642/v1}
      - HERMES_API_KEY=${HERMES_API_KEY:-sk-hermes-local}
      - HERMES_MODEL=${HERMES_MODEL:-hermes-agent}
      - HERMES_TIMEOUT_SECONDS=${HERMES_TIMEOUT_SECONDS:-180}
      - HERMES_MAX_OUTPUT_CHARS=${HERMES_MAX_OUTPUT_CHARS:-8000}
      - HERMES_TEMPERATURE=${HERMES_TEMPERATURE:-0.2}
      - ALPHARAVIS_ENABLE_HERMES_AGENT=${ALPHARAVIS_ENABLE_HERMES_AGENT:-false}
      - ALPHARAVIS_MODEL=${ALPHARAVIS_MODEL:-openai/big-boss}
      - ALPHARAVIS_LLM_STREAMING=${ALPHARAVIS_LLM_STREAMING:-true}
      - ALPHARAVIS_ENABLE_FAST_PATH=${ALPHARAVIS_ENABLE_FAST_PATH:-true}
      - ALPHARAVIS_FAST_PATH_MAX_CHARS=${ALPHARAVIS_FAST_PATH_MAX_CHARS:-360}
      - ALPHARAVIS_FAST_PATH_PRIMARY_TIMEOUT_SECONDS=${ALPHARAVIS_FAST_PATH_PRIMARY_TIMEOUT_SECONDS:-20}
      - ALPHARAVIS_FAST_PATH_ENABLE_FALLBACK=${ALPHARAVIS_FAST_PATH_ENABLE_FALLBACK:-true}
      - ALPHARAVIS_FAST_PATH_FALLBACK_MODEL=${ALPHARAVIS_FAST_PATH_FALLBACK_MODEL:-openai/edge-gemma}
      - ALPHARAVIS_FAST_PATH_FALLBACK_TIMEOUT_SECONDS=${ALPHARAVIS_FAST_PATH_FALLBACK_TIMEOUT_SECONDS:-45}
      - ALPHARAVIS_FAST_PATH_MAX_TOKENS=${ALPHARAVIS_FAST_PATH_MAX_TOKENS:-256}
      - ALPHARAVIS_FAST_PATH_TEMPERATURE=${ALPHARAVIS_FAST_PATH_TEMPERATURE:-0}
      - ALPHARAVIS_FAST_PATH_DISABLE_THINKING=${ALPHARAVIS_FAST_PATH_DISABLE_THINKING:-true}
      - ALPHARAVIS_SHOW_FAST_PATH_NOTICE=${ALPHARAVIS_SHOW_FAST_PATH_NOTICE:-true}
      - ALPHARAVIS_FAST_PATH_LOCK_AFTER_SWARM=${ALPHARAVIS_FAST_PATH_LOCK_AFTER_SWARM:-true}
      - ALPHARAVIS_ENABLE_THINKING=${ALPHARAVIS_ENABLE_THINKING:-true}
      - ALPHARAVIS_PRESERVE_THINKING=${ALPHARAVIS_PRESERVE_THINKING:-true}
      - ALPHARAVIS_ENABLE_PLANNER_NODE=${ALPHARAVIS_ENABLE_PLANNER_NODE:-true}
      - ALPHARAVIS_PLANNER_MIN_QUERY_CHARS=${ALPHARAVIS_PLANNER_MIN_QUERY_CHARS:-500}
      - ALPHARAVIS_PLANNER_MAX_CHARS=${ALPHARAVIS_PLANNER_MAX_CHARS:-1800}
      - ALPHARAVIS_PLANNER_TIMEOUT_SECONDS=${ALPHARAVIS_PLANNER_TIMEOUT_SECONDS:-45}
      - ALPHARAVIS_SHOW_RUN_PROFILE=${ALPHARAVIS_SHOW_RUN_PROFILE:-false}
      - ALPHARAVIS_LOAD_MCP_TOOLS=${ALPHARAVIS_LOAD_MCP_TOOLS:-false}
      - ALPHARAVIS_MCP_CONFIG_PATH=${ALPHARAVIS_MCP_CONFIG_PATH:-/workspace/langgraph-app/mcp.json}
      - ALPHARAVIS_MCP_CONFIG_PATHS=${ALPHARAVIS_MCP_CONFIG_PATHS:-}
      - ALPHARAVIS_MCP_ALLOW_STDIO=${ALPHARAVIS_MCP_ALLOW_STDIO:-false}
      - ALPHARAVIS_MCP_TOOL_PREFIX=${ALPHARAVIS_MCP_TOOL_PREFIX:-true}
      - ALPHARAVIS_MCP_STRICT=${ALPHARAVIS_MCP_STRICT:-false}
      - ALPHARAVIS_REQUIRE_COMMAND_APPROVAL=${ALPHARAVIS_REQUIRE_COMMAND_APPROVAL:-true}
      - ALPHARAVIS_LOCAL_COMMAND_TIMEOUT_SECONDS=${ALPHARAVIS_LOCAL_COMMAND_TIMEOUT_SECONDS:-45}
      - ALPHARAVIS_ENABLE_SKILL_LIBRARY=${ALPHARAVIS_ENABLE_SKILL_LIBRARY:-true}
      - ALPHARAVIS_SKILL_LIBRARY_SEARCH_LIMIT=${ALPHARAVIS_SKILL_LIBRARY_SEARCH_LIMIT:-3}
      - ALPHARAVIS_SKILL_CONTEXT_MAX_CHARS=${ALPHARAVIS_SKILL_CONTEXT_MAX_CHARS:-2500}
      - ALPHARAVIS_REPO_SKILL_HINT_LIMIT=${ALPHARAVIS_REPO_SKILL_HINT_LIMIT:-3}
      - ALPHARAVIS_ALLOW_SKILL_PROMOTION=${ALPHARAVIS_ALLOW_SKILL_PROMOTION:-false}
      - ALPHARAVIS_ENABLE_HIERARCHICAL_COMPRESSION=${ALPHARAVIS_ENABLE_HIERARCHICAL_COMPRESSION:-true}
      - ALPHARAVIS_ENABLE_POST_RUN_COMPRESSION=${ALPHARAVIS_ENABLE_POST_RUN_COMPRESSION:-true}
      - ALPHARAVIS_ARCHIVE_TOKEN_LIMIT=${ALPHARAVIS_ARCHIVE_TOKEN_LIMIT:-50000}
      - ALPHARAVIS_ARCHIVE_KEEP_RECENT_RECORDS=${ALPHARAVIS_ARCHIVE_KEEP_RECENT_RECORDS:-8}
      - ALPHARAVIS_ALLOW_USER_COMPRESSION_PAUSE=${ALPHARAVIS_ALLOW_USER_COMPRESSION_PAUSE:-true}
      - ALPHARAVIS_MANUAL_COMPRESSION_PATTERNS=${ALPHARAVIS_MANUAL_COMPRESSION_PATTERNS:-}
      - ALPHARAVIS_SHOW_MEMORY_NOTICES=${ALPHARAVIS_SHOW_MEMORY_NOTICES:-true}
      - ALPHARAVIS_ARCHIVE_SEARCH_LIMIT=${ALPHARAVIS_ARCHIVE_SEARCH_LIMIT:-5}
      - ALPHARAVIS_CROSS_THREAD_ARCHIVE_SEARCH_LIMIT=${ALPHARAVIS_CROSS_THREAD_ARCHIVE_SEARCH_LIMIT:-3}
      - ALPHARAVIS_ENABLE_MEMORY_KERNEL=${ALPHARAVIS_ENABLE_MEMORY_KERNEL:-true}
      - ALPHARAVIS_MEMORY_NUDGE_INTERVAL=${ALPHARAVIS_MEMORY_NUDGE_INTERVAL:-10}
      - ALPHARAVIS_MEMORY_KERNEL_PRECOMPRESS_NOTES=${ALPHARAVIS_MEMORY_KERNEL_PRECOMPRESS_NOTES:-true}
      - ALPHARAVIS_ALWAYS_MEMORY_MAX_ITEMS=${ALPHARAVIS_ALWAYS_MEMORY_MAX_ITEMS:-6}
      - ALPHARAVIS_ALWAYS_MEMORY_MAX_CHARS=${ALPHARAVIS_ALWAYS_MEMORY_MAX_CHARS:-2200}
      - ALPHARAVIS_CURATED_MEMORY_ENTRY_MAX_CHARS=${ALPHARAVIS_CURATED_MEMORY_ENTRY_MAX_CHARS:-1200}
      - ALPHARAVIS_CURATED_MEMORY_SEARCH_LIMIT=${ALPHARAVIS_CURATED_MEMORY_SEARCH_LIMIT:-5}
      - ALPHARAVIS_SESSION_SEARCH_LIMIT=${ALPHARAVIS_SESSION_SEARCH_LIMIT:-5}
      - ALPHARAVIS_CROSS_THREAD_SESSION_SEARCH_LIMIT=${ALPHARAVIS_CROSS_THREAD_SESSION_SEARCH_LIMIT:-3}
      - ALPHARAVIS_ENABLE_ARTIFACTS=${ALPHARAVIS_ENABLE_ARTIFACTS:-true}
      - ALPHARAVIS_ARTIFACT_ROOT=${ALPHARAVIS_ARTIFACT_ROOT:-/workspace/artifacts/alpharavis}
      - ALPHARAVIS_ARTIFACT_MAX_CHARS=${ALPHARAVIS_ARTIFACT_MAX_CHARS:-120000}
      - ALPHARAVIS_ARTIFACT_INDEX_PREVIEW_CHARS=${ALPHARAVIS_ARTIFACT_INDEX_PREVIEW_CHARS:-4000}
      - ALPHARAVIS_ARTIFACT_READ_MAX_CHARS=${ALPHARAVIS_ARTIFACT_READ_MAX_CHARS:-24000}
      - ALPHARAVIS_ARTIFACT_LIST_LIMIT=${ALPHARAVIS_ARTIFACT_LIST_LIMIT:-10}
      - ALPHARAVIS_VECTOR_BACKEND=${ALPHARAVIS_VECTOR_BACKEND:-pgvector}
      - ALPHARAVIS_ENABLE_PGVECTOR_MEMORY=${ALPHARAVIS_ENABLE_PGVECTOR_MEMORY:-true}
      - ALPHARAVIS_PGVECTOR_DATABASE_URL=${ALPHARAVIS_PGVECTOR_DATABASE_URL:-postgresql://postgres:${POSTGRES_PASSWORD}@vectordb:5432/rag_api}
      - ALPHARAVIS_PGVECTOR_TABLE=${ALPHARAVIS_PGVECTOR_TABLE:-alpharavis_memory_vectors}
      - ALPHARAVIS_PGVECTOR_EMBEDDING_BASE_URL=${ALPHARAVIS_PGVECTOR_EMBEDDING_BASE_URL:-http://litellm:4000/v1}
      - ALPHARAVIS_PGVECTOR_EMBEDDING_API_KEY=${ALPHARAVIS_PGVECTOR_EMBEDDING_API_KEY:-sk-local-dev}
      - ALPHARAVIS_PGVECTOR_EMBEDDING_MODEL=${ALPHARAVIS_PGVECTOR_EMBEDDING_MODEL:-memory-embed}
      - ALPHARAVIS_PGVECTOR_FALLBACK_EMBEDDING_MODEL=${ALPHARAVIS_PGVECTOR_FALLBACK_EMBEDDING_MODEL:-memory-embed-fallback}
      - ALPHARAVIS_PGVECTOR_EMBEDDING_TIMEOUT_SECONDS=${ALPHARAVIS_PGVECTOR_EMBEDDING_TIMEOUT_SECONDS:-20}
      - ALPHARAVIS_PGVECTOR_INDEX_MODE=${ALPHARAVIS_PGVECTOR_INDEX_MODE:-background}
      - ALPHARAVIS_PGVECTOR_STORE_FULL_CHUNKS=${ALPHARAVIS_PGVECTOR_STORE_FULL_CHUNKS:-true}
      - ALPHARAVIS_PGVECTOR_CATALOG_ENABLED=${ALPHARAVIS_PGVECTOR_CATALOG_ENABLED:-true}
      - ALPHARAVIS_PGVECTOR_CHUNK_MAX_CHARS=${ALPHARAVIS_PGVECTOR_CHUNK_MAX_CHARS:-6000}
      - ALPHARAVIS_PGVECTOR_CHUNK_OVERLAP_CHARS=${ALPHARAVIS_PGVECTOR_CHUNK_OVERLAP_CHARS:-800}
      - ALPHARAVIS_PGVECTOR_CREATE_HNSW_INDEX=${ALPHARAVIS_PGVECTOR_CREATE_HNSW_INDEX:-true}
      - ALPHARAVIS_PGVECTOR_SEARCH_LIMIT=${ALPHARAVIS_PGVECTOR_SEARCH_LIMIT:-5}
      - ALPHARAVIS_CROSS_THREAD_VECTOR_SEARCH_LIMIT=${ALPHARAVIS_CROSS_THREAD_VECTOR_SEARCH_LIMIT:-3}
      - ALPHARAVIS_PGVECTOR_RESULT_PREVIEW_CHARS=${ALPHARAVIS_PGVECTOR_RESULT_PREVIEW_CHARS:-900}
      - ALPHARAVIS_PGVECTOR_PREVIEW_CHARS=${ALPHARAVIS_PGVECTOR_PREVIEW_CHARS:-900}
      - ALPHARAVIS_PGVECTOR_SESSION_WINDOW_TURNS=${ALPHARAVIS_PGVECTOR_SESSION_WINDOW_TURNS:-2}
      - ALPHARAVIS_PGVECTOR_PREFETCH_ENABLED=${ALPHARAVIS_PGVECTOR_PREFETCH_ENABLED:-true}
      - ALPHARAVIS_PGVECTOR_PREFETCH_LIMIT=${ALPHARAVIS_PGVECTOR_PREFETCH_LIMIT:-3}
      - ALPHARAVIS_PGVECTOR_PREFETCH_MAX_CHARS=${ALPHARAVIS_PGVECTOR_PREFETCH_MAX_CHARS:-1800}
      - ALPHARAVIS_ENABLE_RAG_FEDERATED_SEARCH=${ALPHARAVIS_ENABLE_RAG_FEDERATED_SEARCH:-true}
      - ALPHARAVIS_RAG_API_URL=${ALPHARAVIS_RAG_API_URL:-http://rag_api:8000}
      - ALPHARAVIS_RAG_FEDERATED_TIMEOUT_SECONDS=${ALPHARAVIS_RAG_FEDERATED_TIMEOUT_SECONDS:-20}
      - ALPHARAVIS_RAG_FEDERATED_MAX_FILE_IDS=${ALPHARAVIS_RAG_FEDERATED_MAX_FILE_IDS:-200}
      - ALPHARAVIS_RAG_RESULT_PREVIEW_CHARS=${ALPHARAVIS_RAG_RESULT_PREVIEW_CHARS:-1400}
      - ALPHARAVIS_ARCHITECTURE_DOC_PATH=${ALPHARAVIS_ARCHITECTURE_DOC_PATH:-/workspace/docs/ALPHARAVIS_ARCHITECTURE.md}
      - ALPHARAVIS_ARCHITECTURE_DOC_MAX_CHARS=${ALPHARAVIS_ARCHITECTURE_DOC_MAX_CHARS:-6000}
      - MONGODB_URI=mongodb://mongodb:27017
      - LS_MONGODB_URI=mongodb://mongodb:27017/langgraph?replicaSet=rs0
      - REDIS_URL=redis://redis:6379
      - PORT=2024
      # --- LANGSMITH OBSERVABILITY (Für LangGraphics & Debugging) ---
      - LANGCHAIN_TRACING_V2=true
      - LANGCHAIN_ENDPOINT=https://api.smith.langchain.com
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY:-dein_langsmith_key_hier}
      - LANGCHAIN_PROJECT=AlphaRavis_Stack
    healthcheck:
      test: ["CMD-SHELL", "curl -sS http://localhost:2024 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    depends_on:
      litellm:
        condition: service_started
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    restart: always

  # --- DER MUND (OpenAI-kompatible Bridge fÃ¼r LibreChat) ---
  api-bridge:
    build:
      context: .
      dockerfile: ./langgraph-app/Dockerfile
    container_name: api-bridge
    command: ["uvicorn", "bridge_server:app", "--host", "0.0.0.0", "--port", "8123"]
    ports:
      - "8123:8123"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./langgraph-app:/app
      - ./langchain-bridge-repo/langchain_fastapi_chat_completion:/app/langchain_fastapi_chat_completion
    environment:
      - LANGGRAPH_API_URL=http://langgraph-api:2024
      - LANGGRAPH_ASSISTANT_ID=alpha_ravis
      - OPENAI_MODEL_NAME=my-agent
      - BRIDGE_RUN_TIMEOUT_SECONDS=${BRIDGE_RUN_TIMEOUT_SECONDS:-180}
      - BRIDGE_STREAM_MODE=${BRIDGE_STREAM_MODE:-events}
      - BRIDGE_MESSAGE_SYNC_MODE=${BRIDGE_MESSAGE_SYNC_MODE:-delta}
      - BRIDGE_SHOW_ACTIVITY_EVENTS=${BRIDGE_SHOW_ACTIVITY_EVENTS:-false}
      - BRIDGE_ACTIVITY_DETAIL=${BRIDGE_ACTIVITY_DETAIL:-summary}
      - BRIDGE_LLM_HEALTH_URL=${BRIDGE_LLM_HEALTH_URL:-http://litellm:4000/v1}
      - BRIDGE_LLM_HEALTH_API_KEY=${BRIDGE_LLM_HEALTH_API_KEY:-sk-local-dev}
      - BRIDGE_LLM_HEALTH_MODEL=${BRIDGE_LLM_HEALTH_MODEL:-big-boss}
      - BRIDGE_LLM_HEALTH_FALLBACK_MODEL=${BRIDGE_LLM_HEALTH_FALLBACK_MODEL:-edge-gemma}
      - BRIDGE_LLM_HEALTH_TIMEOUT_SECONDS=${BRIDGE_LLM_HEALTH_TIMEOUT_SECONDS:-10}
      - BRIDGE_LLM_HEALTH_PROMPT=${BRIDGE_LLM_HEALTH_PROMPT:-Antworte nur mit OK.}
      - BRIDGE_ENABLE_LANGGRAPH_TOOL=${BRIDGE_ENABLE_LANGGRAPH_TOOL:-false}
      - BRIDGE_LANGGRAPH_TOOL_API_KEY=${BRIDGE_LANGGRAPH_TOOL_API_KEY:-}
      - BRIDGE_LANGGRAPH_TOOL_TIMEOUT_SECONDS=${BRIDGE_LANGGRAPH_TOOL_TIMEOUT_SECONDS:-120}
    depends_on:
      langgraph-api:
        condition: service_healthy
    env_file:
      - .env
    restart: always

  # --- FRONTENDS ---

  # Das offizielle LangChain Deep Agents UI
  deep-agents-ui:
    build:
      context: ./deep-agents-ui
      dockerfile: ../docker/deep-agents-ui/Dockerfile
    container_name: deep-agents-ui
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_LANGGRAPH_API_URL=http://localhost:2024
      - LANGGRAPH_API_URL=http://langgraph-api:2024
    depends_on:
      - langgraph-api

  # Dein spezielles Agent UI (Alternative)
  agent-custom-ui:
    build:
      context: ./agent-custom-ui
      dockerfile: Dockerfile
    container_name: agent-custom-ui
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_ASSISTANT_ID=alpha_ravis
      - LANGGRAPH_API_URL=http://langgraph-api:2024
      - NEXT_PUBLIC_API_URL=/api
    depends_on:
      - langgraph-api
    restart: always

  # LibreChat (Main Chat Interface)
  librechat:
    image: ghcr.io/danny-avila/librechat:latest
    container_name: librechat
    ports:
      - "3080:3080"
    depends_on:
      - mongodb
      - redis
      - litellm
      - rag_api
      - api-bridge
    environment:
      - MONGO_URI=mongodb://mongodb:27017/LibreChat
      - REDIS_URL=redis://redis:6379
      - CONFIG_PATH=/app/librechat.yaml
      - RAG_API_URL=http://rag_api:8000
      # Hier verbindest du LibreChat mit deiner LangGraph Bridge
      - OPENAI_REVERSE_PROXY=http://api-bridge:8123/v1
      - HERMES_API_BASE=${HERMES_API_BASE:-http://host.docker.internal:8642/v1}
      - HERMES_API_KEY=${HERMES_API_KEY:-sk-hermes-local}
      - HERMES_MODEL=${HERMES_MODEL:-hermes-agent}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./librechat.yaml:/app/librechat.yaml
      - ./librechat-data/images:/app/client/public/images
    restart: always
    env_file:
      - .env
  # --- PIXELLE MCP ---
  pixelle:
    build:
      context: ./pixelle-mcp-custom
      dockerfile: Dockerfile
    container_name: pixelle
    ports:
      - "9004:9004"
    volumes:
      - ./pixelle-data:/app/data
      - ./pixelle-mcp-custom/.env:/app/.env:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

