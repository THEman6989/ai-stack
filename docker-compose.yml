services:
  # --- DATENBANKEN ---
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017" # Debugging-Port für MongoDB Compass
    volumes:
      - ./librechat-data/db:/data/db
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"try { rs.status().ok } catch (e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}).ok }\" | grep 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 10s
    restart: always
    

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379" # Debugging-Port für Redis
    #volumes:
      #- ./librechat-data/redis:/data
    env_file:
      - .env
    restart: always
    #command: redis-server --save 60 1 --loglevel warning

  # --- DATENBANKEN ---
  vectordb:
    image: ankane/pgvector:latest
    container_name: vectordb
    environment:
      - POSTGRES_DB=rag_api
      - POSTGRES_USER=postgres
      # Hier wird die Variable aus deiner .env eingesetzt
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./data/pgdata:/var/lib/postgresql/data
    env_file:
      - .env
    restart: always

  # --- KI INFRASTRUKTUR ---
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@vectordb:5432/rag_api
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-local-dev}
      - EMBEDDING_LITELLM_MODEL=${EMBEDDING_LITELLM_MODEL:-openai/Q78KG/gte-Qwen2-1.5B-instruct}
      - EMBEDDING_FALLBACK_LITELLM_MODEL=${EMBEDDING_FALLBACK_LITELLM_MODEL:-openai/bge-m3}
      - EMBEDDING_API_BASE=${EMBEDDING_API_BASE:-http://192.168.178.140:11434/v1}
      - EMBEDDING_TIMEOUT_SECONDS=${EMBEDDING_TIMEOUT_SECONDS:-30}
      - VISION_EMBEDDING_LITELLM_MODEL=${VISION_EMBEDDING_LITELLM_MODEL:-openai/Qwen2BVL}
      - VISION_EMBEDDING_FALLBACK_LITELLM_MODEL=${VISION_EMBEDDING_FALLBACK_LITELLM_MODEL:-openai/bge-m3}
      - VISION_EMBEDDING_API_BASE=${VISION_EMBEDDING_API_BASE:-http://192.168.178.140:11434/v1}
    env_file:
      - .env
    volumes:
      - ./litellm-config/config.yaml:/app/config.yaml
    ports:
      - "4000:4000"
    command: [ "--config", "/app/config.yaml", "--port", "4000" ]
    restart: always

  rag_api:
    build:
      context: ./rag-api-repo
      dockerfile: Dockerfile
    container_name: rag_api
    environment:
      - VECTOR_DB_TYPE=pgvector
      - DB_HOST=vectordb
      - DB_PORT=5432
      - POSTGRES_DB=rag_api
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - RAG_OPENAI_API_KEY=any-string
      - RAG_OPENAI_BASEURL=http://litellm:4000
    depends_on:
      - vectordb
      - litellm
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: always

  # --- HERMES CODING/SYSTEM AGENT ---
  hermes-agent:
    build:
      context: ./hermes-agent
      dockerfile: Dockerfile
    image: alpharavis/hermes-agent:local
    container_name: hermes-agent
    ports:
      - "8642:8642"
    volumes:
      - ${HERMES_HOME_DIR:-./hermes-data}:/opt/data
      - ./:/workspace:ro
    env_file:
      - .env
    environment:
      - HERMES_UID=${HERMES_UID:-10000}
      - HERMES_GID=${HERMES_GID:-10000}
      - HERMES_HOME=/opt/data
      - HERMES_WORKDIR=/workspace
      - HERMES_INFERENCE_PROVIDER=${HERMES_INFERENCE_PROVIDER:-custom}
      - HERMES_INFERENCE_MODEL=${HERMES_INFERENCE_MODEL:-big-boss}
      - HERMES_MODEL=${HERMES_INFERENCE_MODEL:-big-boss}
      - OPENAI_BASE_URL=${HERMES_OPENAI_BASE_URL:-http://litellm:4000/v1}
      - OPENAI_API_KEY=${HERMES_OPENAI_API_KEY:-sk-local-dev}
      - API_SERVER_ENABLED=${HERMES_API_SERVER_ENABLED:-true}
      - API_SERVER_HOST=${HERMES_API_SERVER_HOST:-0.0.0.0}
      - API_SERVER_PORT=${HERMES_API_SERVER_PORT:-8642}
      - API_SERVER_KEY=${HERMES_API_KEY:-sk-hermes-local}
      - API_SERVER_MODEL_NAME=${HERMES_MODEL:-hermes-agent}
      - API_SERVER_CORS_ORIGINS=${HERMES_API_SERVER_CORS_ORIGINS:-http://localhost:3080,http://127.0.0.1:3080}
      - HERMES_MAX_ITERATIONS=${HERMES_MAX_ITERATIONS:-30}
    command: ["gateway", "run"]
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8642/v1/health', timeout=5).read()\""]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    depends_on:
      - litellm
    restart: unless-stopped

  hermes-dashboard:
    build:
      context: ./hermes-agent
      dockerfile: Dockerfile
    image: alpharavis/hermes-agent:local
    container_name: hermes-dashboard
    profiles:
      - hermes-dashboard
    ports:
      - "9119:9119"
    volumes:
      - ${HERMES_HOME_DIR:-./hermes-data}:/opt/data
    env_file:
      - .env
    environment:
      - HERMES_UID=${HERMES_UID:-10000}
      - HERMES_GID=${HERMES_GID:-10000}
      - HERMES_HOME=/opt/data
    command: ["dashboard", "--host", "0.0.0.0", "--no-open"]
    depends_on:
      - hermes-agent
    restart: unless-stopped

  # --- DER BRAIN (AlphaRavis LangGraph API) ---
  langgraph-api:
    build:
      context: .
      dockerfile: ./langgraph-app/Dockerfile
    container_name: langgraph-api
    command: ["sh", "-c", "rm -f /tmp/.X0-lock && Xvfb :0 -screen 0 1280x720x24 & fluxbox & x11vnc -display :0 -forever -nopw -listen 0.0.0.0 & cd /workspace/langgraph-app && langgraph dev --config langgraph.json --host 0.0.0.0 --port 2024 --no-browser"]
    ports:
      - "2024:2024"
      - "5900:5900" # VNC Port für die Sandbox
      # --- NEU: LangGraphics Ports freigeben ---
      - "8760:8760" # Research UI
      - "8762:8762" # General UI
      - "8764:8764" # Computer/CUA UI
      - "8766:8766" # Debugger UI
      - "8768:8768" # Main Supervisor UI
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./langgraph-app:/app
      - ./langchain-bridge-repo/langchain_fastapi_chat_completion:/app/langchain_fastapi_chat_completion
      - ./local-deep-researcher-repo:/app/local_deep_researcher
      - ./:/workspace # WICHTIG: Die Sandbox braucht Zugriff auf deine Files zum Coden!
      - ./logs:/logs
    environment:
      # Most AlphaRavis switches live in .env. This block only pins container
      # wiring that differs from local/non-Docker development.
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - OPENAI_API_BASE=${OPENAI_API_BASE:-http://litellm:4000/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-local-dev}
      - PIXELLE_URL=${PIXELLE_URL:-http://pixelle:9004}
      - HERMES_API_BASE=${HERMES_API_BASE:-http://hermes-agent:8642/v1}
      - HERMES_API_KEY=${HERMES_API_KEY:-sk-hermes-local}
      - HERMES_MODEL=${HERMES_MODEL:-hermes-agent}
      - ALPHARAVIS_ARTIFACT_ROOT=${ALPHARAVIS_ARTIFACT_ROOT:-/workspace/artifacts/alpharavis}
      - ALPHARAVIS_PGVECTOR_DATABASE_URL=${ALPHARAVIS_PGVECTOR_DATABASE_URL:-postgresql://postgres:${POSTGRES_PASSWORD}@vectordb:5432/rag_api}
      - ALPHARAVIS_PGVECTOR_EMBEDDING_BASE_URL=${ALPHARAVIS_PGVECTOR_EMBEDDING_BASE_URL:-http://litellm:4000/v1}
      - ALPHARAVIS_PGVECTOR_EMBEDDING_API_KEY=${ALPHARAVIS_PGVECTOR_EMBEDDING_API_KEY:-sk-local-dev}
      - ALPHARAVIS_RAG_API_URL=${ALPHARAVIS_RAG_API_URL:-http://rag_api:8000}
      - ALPHARAVIS_MEDIA_GALLERY_URL=${ALPHARAVIS_MEDIA_GALLERY_URL:-http://media-gallery:8130}
      - OPENWEBUI_URL=${OPENWEBUI_URL:-http://openwebui:8080}
      - ALPHARAVIS_ARCHITECTURE_DOC_PATH=${ALPHARAVIS_ARCHITECTURE_DOC_PATH:-/workspace/docs/ALPHARAVIS_ARCHITECTURE.md}
      - ALPHARAVIS_LOG_DIR=${ALPHARAVIS_DOCKER_LOG_DIR:-/logs}
      - MONGODB_URI=mongodb://mongodb:27017
      - LS_MONGODB_URI=${LS_MONGODB_URI:-mongodb://mongodb:27017/langgraph?replicaSet=rs0}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - PORT=2024
      # --- LANGSMITH OBSERVABILITY (Für LangGraphics & Debugging) ---
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
      - LANGCHAIN_ENDPOINT=${LANGCHAIN_ENDPOINT:-https://api.smith.langchain.com}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY:-dein_langsmith_key_hier}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT:-AlphaRavis_Stack}
    healthcheck:
      test: ["CMD-SHELL", "curl -sS http://localhost:2024 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    depends_on:
      litellm:
        condition: service_started
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started
      hermes-agent:
        condition: service_started
      media-gallery:
        condition: service_started
    env_file:
      - .env
    restart: always

  # --- DER MUND (OpenAI-kompatible Bridge fÃ¼r LibreChat) ---
  # --- ALPHARAVIS MEDIA GALLERY ---
  media-gallery:
    build:
      context: .
      dockerfile: ./langgraph-app/Dockerfile
    container_name: media-gallery
    command: ["uvicorn", "media_server:app", "--host", "0.0.0.0", "--port", "8130"]
    ports:
      - "${ALPHARAVIS_MEDIA_PORT:-8130}:8130"
    volumes:
      - ./langgraph-app:/app
      - ./media-data:/media-data
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
      - ALPHARAVIS_MEDIA_ROOT=${ALPHARAVIS_MEDIA_ROOT:-/media-data}
      - ALPHARAVIS_MEDIA_PUBLIC_BASE_URL=${ALPHARAVIS_MEDIA_PUBLIC_BASE_URL:-http://localhost:8130}
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  api-bridge:
    build:
      context: .
      dockerfile: ./langgraph-app/Dockerfile
    container_name: api-bridge
    command: ["uvicorn", "bridge_server:app", "--host", "0.0.0.0", "--port", "8123"]
    ports:
      - "8123:8123"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./langgraph-app:/app
      - ./langchain-bridge-repo/langchain_fastapi_chat_completion:/app/langchain_fastapi_chat_completion
      - ./logs:/logs
    environment:
      - LANGGRAPH_API_URL=http://langgraph-api:2024
      - LANGGRAPH_ASSISTANT_ID=alpha_ravis
      - OPENAI_MODEL_NAME=my-agent
      - BRIDGE_RUN_TIMEOUT_SECONDS=${BRIDGE_RUN_TIMEOUT_SECONDS:-180}
      - BRIDGE_STREAM_MODE=${BRIDGE_STREAM_MODE:-events}
      - BRIDGE_MESSAGE_SYNC_MODE=${BRIDGE_MESSAGE_SYNC_MODE:-delta}
      - BRIDGE_SHOW_ACTIVITY_EVENTS=${BRIDGE_SHOW_ACTIVITY_EVENTS:-false}
      - BRIDGE_ACTIVITY_DETAIL=${BRIDGE_ACTIVITY_DETAIL:-summary}
      - BRIDGE_STREAM_REASONING_EVENTS=${BRIDGE_STREAM_REASONING_EVENTS:-false}
      - BRIDGE_REASONING_DELTA_FIELD=${BRIDGE_REASONING_DELTA_FIELD:-reasoning_content}
      - BRIDGE_ENABLE_RESPONSES_API=${BRIDGE_ENABLE_RESPONSES_API:-true}
      - BRIDGE_PREFERRED_API_MODE=${BRIDGE_PREFERRED_API_MODE:-responses}
      - BRIDGE_ALLOW_RAW_MEDIA_CONTEXT=${BRIDGE_ALLOW_RAW_MEDIA_CONTEXT:-false}
      - BRIDGE_MEDIA_CONTEXT_MODE=${BRIDGE_MEDIA_CONTEXT_MODE:-metadata}
      - BRIDGE_LLM_HEALTH_URL=${BRIDGE_LLM_HEALTH_URL:-http://litellm:4000/v1}
      - BRIDGE_LLM_HEALTH_API_KEY=${BRIDGE_LLM_HEALTH_API_KEY:-sk-local-dev}
      - BRIDGE_LLM_HEALTH_MODEL=${BRIDGE_LLM_HEALTH_MODEL:-big-boss}
      - BRIDGE_LLM_HEALTH_FALLBACK_MODEL=${BRIDGE_LLM_HEALTH_FALLBACK_MODEL:-edge-gemma}
      - BRIDGE_LLM_HEALTH_TIMEOUT_SECONDS=${BRIDGE_LLM_HEALTH_TIMEOUT_SECONDS:-10}
      - BRIDGE_LLM_HEALTH_PROMPT=${BRIDGE_LLM_HEALTH_PROMPT:-Antworte nur mit OK.}
      - BRIDGE_ENABLE_LANGGRAPH_TOOL=${BRIDGE_ENABLE_LANGGRAPH_TOOL:-false}
      - BRIDGE_LANGGRAPH_TOOL_API_KEY=${BRIDGE_LANGGRAPH_TOOL_API_KEY:-}
      - BRIDGE_LANGGRAPH_TOOL_TIMEOUT_SECONDS=${BRIDGE_LANGGRAPH_TOOL_TIMEOUT_SECONDS:-120}
      - ALPHARAVIS_LOG_DIR=${ALPHARAVIS_DOCKER_LOG_DIR:-/logs}
    depends_on:
      langgraph-api:
        condition: service_healthy
    env_file:
      - .env
    restart: always

  # --- FRONTENDS ---

  # Das offizielle LangChain Deep Agents UI
  deep-agents-ui:
    build:
      context: ./deep-agents-ui
      dockerfile: ../docker/deep-agents-ui/Dockerfile
    container_name: deep-agents-ui
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_LANGGRAPH_API_URL=http://localhost:2024
      - LANGGRAPH_API_URL=http://langgraph-api:2024
    depends_on:
      - langgraph-api

  # Dein spezielles Agent UI (Alternative)
  agent-custom-ui:
    build:
      context: ./agent-custom-ui
      dockerfile: Dockerfile
    container_name: agent-custom-ui
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_ASSISTANT_ID=alpha_ravis
      - LANGGRAPH_API_URL=http://langgraph-api:2024
      - NEXT_PUBLIC_API_URL=/api
    depends_on:
      - langgraph-api
    restart: always

  # LibreChat (Main Chat Interface)
  librechat:
    image: ghcr.io/danny-avila/librechat:latest
    container_name: librechat
    ports:
      - "3080:3080"
    depends_on:
      - mongodb
      - redis
      - litellm
      - rag_api
      - api-bridge
      - hermes-agent
      - media-gallery
    environment:
      - MONGO_URI=mongodb://mongodb:27017/LibreChat
      - REDIS_URL=redis://redis:6379
      - CONFIG_PATH=/app/librechat.yaml
      - RAG_API_URL=http://rag_api:8000
      # Named custom endpoints are configured in librechat.yaml. Keep the
      # generic OpenAI bucket hidden by default; set LIBRECHAT_OPENAI_* in .env
      # if you intentionally want that extra provider to point at the bridge.
      - OPENAI_API_KEY=${LIBRECHAT_OPENAI_API_KEY:-}
      - OPENAI_REVERSE_PROXY=${LIBRECHAT_OPENAI_REVERSE_PROXY:-}
      - HERMES_API_BASE=${HERMES_API_BASE:-http://hermes-agent:8642/v1}
      - HERMES_API_KEY=${HERMES_API_KEY:-sk-hermes-local}
      - HERMES_MODEL=${HERMES_MODEL:-hermes-agent}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./librechat.yaml:/app/librechat.yaml
      - ./librechat-data/images:/app/client/public/images
    restart: always
    env_file:
      - .env

  # OpenWebUI as optional second frontend. It uses AlphaRavis's bridge as the
  # OpenAI-compatible provider; AlphaRavis remains the brain/router.
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    profiles:
      - openwebui
    ports:
      - "${OPENWEBUI_PORT:-3090}:8080"
    volumes:
      - ./openwebui-data:/app/backend/data
    env_file:
      - .env
    environment:
      - OPENAI_API_BASE_URL=http://api-bridge:8123/v1
      - OPENAI_API_BASE_URLS=http://api-bridge:8123/v1
      - OPENAI_API_KEY=${OPENWEBUI_OPENAI_API_KEY:-sk-local-dev}
      - OPENAI_API_KEYS=${OPENWEBUI_OPENAI_API_KEY:-sk-local-dev}
      - ENABLE_OPENAI_API=${OPENWEBUI_ENABLE_OPENAI_API:-true}
      - ENABLE_OPENAI_API_PASSTHROUGH=${OPENWEBUI_ENABLE_OPENAI_API_PASSTHROUGH:-true}
      - WEBUI_SECRET_KEY=${OPENWEBUI_SECRET_KEY:-alpharavis-local-change-me}
      - DEFAULT_MODELS=${OPENWEBUI_DEFAULT_MODELS:-my-agent}
      - ENABLE_WEB_SEARCH=${OPENWEBUI_ENABLE_WEB_SEARCH:-false}
      - RAG_WEB_SEARCH_ENGINE=${OPENWEBUI_RAG_WEB_SEARCH_ENGINE:-searxng}
      - SEARXNG_QUERY_URL=${OPENWEBUI_SEARXNG_QUERY_URL:-}
    depends_on:
      api-bridge:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
  # --- PIXELLE MCP ---
  pixelle:
    build:
      context: ./pixelle-mcp-custom
      dockerfile: Dockerfile
    container_name: pixelle
    ports:
      - "9004:9004"
    volumes:
      - ./pixelle-data:/app/data
    env_file:
      - path: ./pixelle-mcp-custom/.env.local
        required: false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

