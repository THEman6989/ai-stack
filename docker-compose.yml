services:
  # --- DATENBANKEN ---
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017" # Debugging-Port für MongoDB Compass
    volumes:
      - ./librechat-data/db:/data/db
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"try { rs.status().ok } catch (e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}).ok }\" | grep 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 10s
    restart: always
    

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379" # Debugging-Port für Redis
    #volumes:
      #- ./librechat-data/redis:/data
    env_file:
      - .env
    restart: always
    #command: redis-server --save 60 1 --loglevel warning

  # --- DATENBANKEN ---
  vectordb:
    image: ankane/pgvector:latest
    container_name: vectordb
    environment:
      - POSTGRES_DB=rag_api
      - POSTGRES_USER=postgres
      # Hier wird die Variable aus deiner .env eingesetzt
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./data/pgdata:/var/lib/postgresql/data
    env_file:
      - .env
    restart: always

  # --- KI INFRASTRUKTUR ---
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@vectordb:5432/rag_api
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-local-dev}
    env_file:
      - .env
    volumes:
      - ./litellm-config/config.yaml:/app/config.yaml
    ports:
      - "4000:4000"
    command: [ "--config", "/app/config.yaml", "--port", "4000" ]
    restart: always

  rag_api:
    build:
      context: ./rag-api-repo
      dockerfile: Dockerfile
    container_name: rag_api
    environment:
      - VECTOR_DB_TYPE=pgvector
      - DB_HOST=vectordb
      - DB_PORT=5432
      - POSTGRES_DB=rag_api
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - RAG_OPENAI_API_KEY=any-string
      - RAG_OPENAI_BASEURL=http://litellm:4000
    depends_on:
      - vectordb
      - litellm
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: always

  # --- DER BRAIN (AlphaRavis LangGraph API) ---
  langgraph-api:
    build:
      context: .
      dockerfile: ./langgraph-app/Dockerfile
    container_name: langgraph-api
    ports:
      - "2024:2024"
      - "5900:5900" # VNC Port für die Sandbox
      # --- NEU: LangGraphics Ports freigeben ---
      - "8760:8760" # Research UI
      - "8762:8762" # General UI
      - "8764:8764" # Computer/CUA UI
      - "8766:8766" # Debugger UI
      - "8768:8768" # Main Supervisor UI
    volumes:
      - ./langgraph-app:/app
      - ./langchain-bridge-repo/langchain_fastapi_chat_completion:/app/langchain_fastapi_chat_completion
      - ./local-deep-researcher-repo:/app/local_deep_researcher
      - ./:/workspace # WICHTIG: Die Sandbox braucht Zugriff auf deine Files zum Coden!
    environment:
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - OPENAI_API_BASE=http://litellm:4000/v1
      - OPENAI_API_KEY=${LITELLM_MASTER_KEY:-sk-local-dev}
      - ALPHARAVIS_MODEL=${ALPHARAVIS_MODEL:-openai/big-boss}
      - ALPHARAVIS_LLM_STREAMING=${ALPHARAVIS_LLM_STREAMING:-true}
      - ALPHARAVIS_REQUIRE_COMMAND_APPROVAL=${ALPHARAVIS_REQUIRE_COMMAND_APPROVAL:-true}
      - ALPHARAVIS_LOCAL_COMMAND_TIMEOUT_SECONDS=${ALPHARAVIS_LOCAL_COMMAND_TIMEOUT_SECONDS:-45}
      - ALPHARAVIS_ENABLE_SKILL_LIBRARY=${ALPHARAVIS_ENABLE_SKILL_LIBRARY:-true}
      - ALPHARAVIS_SKILL_LIBRARY_SEARCH_LIMIT=${ALPHARAVIS_SKILL_LIBRARY_SEARCH_LIMIT:-3}
      - ALPHARAVIS_SKILL_CONTEXT_MAX_CHARS=${ALPHARAVIS_SKILL_CONTEXT_MAX_CHARS:-2500}
      - ALPHARAVIS_ALLOW_SKILL_PROMOTION=${ALPHARAVIS_ALLOW_SKILL_PROMOTION:-false}
      - ALPHARAVIS_ENABLE_HIERARCHICAL_COMPRESSION=${ALPHARAVIS_ENABLE_HIERARCHICAL_COMPRESSION:-true}
      - ALPHARAVIS_ARCHIVE_TOKEN_LIMIT=${ALPHARAVIS_ARCHIVE_TOKEN_LIMIT:-50000}
      - ALPHARAVIS_ARCHIVE_KEEP_RECENT_RECORDS=${ALPHARAVIS_ARCHIVE_KEEP_RECENT_RECORDS:-8}
      - ALPHARAVIS_ALLOW_USER_COMPRESSION_PAUSE=${ALPHARAVIS_ALLOW_USER_COMPRESSION_PAUSE:-true}
      - ALPHARAVIS_SHOW_MEMORY_NOTICES=${ALPHARAVIS_SHOW_MEMORY_NOTICES:-true}
      - MONGODB_URI=mongodb://mongodb:27017
      - LS_MONGODB_URI=mongodb://mongodb:27017/langgraph?replicaSet=rs0
      - REDIS_URL=redis://redis:6379
      - PORT=2024
      # --- LANGSMITH OBSERVABILITY (Für LangGraphics & Debugging) ---
      - LANGCHAIN_TRACING_V2=true
      - LANGCHAIN_ENDPOINT=https://api.smith.langchain.com
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY:-dein_langsmith_key_hier}
      - LANGCHAIN_PROJECT=AlphaRavis_Stack
    depends_on:
      litellm:
        condition: service_started
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    restart: always

  # --- DER MUND (OpenAI-kompatible Bridge fÃ¼r LibreChat) ---
  api-bridge:
    build:
      context: .
      dockerfile: ./langgraph-app/Dockerfile
    container_name: api-bridge
    command: ["uvicorn", "bridge_server:app", "--host", "0.0.0.0", "--port", "8123"]
    ports:
      - "8123:8123"
    volumes:
      - ./langgraph-app:/app
      - ./langchain-bridge-repo/langchain_fastapi_chat_completion:/app/langchain_fastapi_chat_completion
    environment:
      - LANGGRAPH_API_URL=http://langgraph-api:2024
      - LANGGRAPH_ASSISTANT_ID=alpha_ravis
      - OPENAI_MODEL_NAME=my-agent
      - BRIDGE_RUN_TIMEOUT_SECONDS=${BRIDGE_RUN_TIMEOUT_SECONDS:-180}
      - BRIDGE_STREAM_MODE=${BRIDGE_STREAM_MODE:-events}
      - BRIDGE_MESSAGE_SYNC_MODE=${BRIDGE_MESSAGE_SYNC_MODE:-delta}
    depends_on:
      langgraph-api:
        condition: service_started
    env_file:
      - .env
    restart: always

  # --- FRONTENDS ---

  # Das offizielle LangChain Deep Agents UI
  deep-agents-ui:
    build:
      context: ./deep-agents-ui
      dockerfile: ../docker/deep-agents-ui/Dockerfile
    container_name: deep-agents-ui
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_LANGGRAPH_API_URL=http://localhost:2024
      - LANGGRAPH_API_URL=http://langgraph-api:2024
    depends_on:
      - langgraph-api

  # Dein spezielles Agent UI (Alternative)
  agent-custom-ui:
    build:
      context: ./agent-custom-ui
      dockerfile: Dockerfile
    container_name: agent-custom-ui
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_ASSISTANT_ID=agent
      - LANGGRAPH_API_URL=http://langgraph-api:2024
      - NEXT_PUBLIC_API_URL=/api
    depends_on:
      - langgraph-api
    restart: always

  # LibreChat (Main Chat Interface)
  librechat:
    image: ghcr.io/danny-avila/librechat:latest
    container_name: librechat
    ports:
      - "3080:3080"
    depends_on:
      - mongodb
      - redis
      - litellm
      - rag_api
      - api-bridge
    environment:
      - MONGO_URI=mongodb://mongodb:27017/LibreChat
      - REDIS_URL=redis://redis:6379
      - CONFIG_PATH=/app/librechat.yaml
      - RAG_API_URL=http://rag_api:8000
      # Hier verbindest du LibreChat mit deiner LangGraph Bridge
      - OPENAI_REVERSE_PROXY=http://api-bridge:8123/v1
    volumes:
      - ./librechat.yaml:/app/librechat.yaml
      - ./librechat-data/images:/app/client/public/images
    restart: always
    env_file:
      - .env
  # --- PIXELLE MCP ---
  pixelle:
    build:
      context: ./pixelle-mcp-custom
      dockerfile: Dockerfile
    container_name: pixelle
    ports:
      - "9004:9004"
    volumes:
      - ./pixelle-data:/app/data
      - ./pixelle-mcp-custom/.env:/app/.env:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

