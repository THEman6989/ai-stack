services:
  # --- DATENBANKEN FÜR LIBRECHAT ---
  mongodb:
    image: mongodb/mongodb-community-server:latest
    container_name: mongodb
    volumes:
      - ./librechat-data/db:/data/db
    restart: always

  redis:
    image: redis:alpine
    container_name: redis
    restart: always


  # --- RAG DATENBANK (PostgreSQL mit Vector-Erweiterung) ---
  vectordb:
    image: ankane/pgvector:latest
    container_name: vectordb
    environment:
      POSTGRES_DB: rag_api
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
    ports:
      - "5432:5432"
    volumes:
      - ./data/pgdata:/var/lib/postgresql/data
    restart: always

  # --- RAG API (Dokumenten-Leser) ---
  rag_api:
    build:
      context: ./rag-api-repo  # <-- Das Submodule, das du gerade geladen hast
      dockerfile: Dockerfile
    container_name: rag_api
    environment:
      - VECTOR_DB_TYPE=pgvector
      - POSTGRES_DB=rag_api
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=mysecretpassword
      - DB_HOST=vectordb
      - DB_PORT=5432
      # Wir nutzen dein lokales LiteLLM für das Erstellen der Vektoren!
      - RAG_OPENAI_API_KEY=any-string
      - RAG_OPENAI_BASEURL=http://litellm:4000
    depends_on:
      - vectordb
      - litellm
    ports:
      - "8000:8000"
    restart: always

  # --- LITELLM (Der Modell-Vermittler) ---
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    volumes:
      - ./litellm-config/config.yaml:/app/config.yaml
    ports:
      - "4000:4000"
    command: [ "--config", "/app/config.yaml", "--port", "4000" ]
    restart: always


  # --- OPENCODE SERVER (Der Code-Arbeiter) ---
  opencode-server:
    image: golang:1.24 # Go 1.24 ist laut README die Voraussetzung
    container_name: opencode-server
    # Installiert OpenCode beim Start und fährt den Headless-Server hoch
    command: bash -c "go install github.com/opencode-ai/opencode@latest && /go/bin/opencode serve --host 0.0.0.0 --port 4096"
    ports:
      - "4096:4096"
    volumes:
      # EXTREM WICHTIG: Er braucht Zugriff auf deinen gesamten Workspace,
      # um Code zu lesen und zu schreiben!
      - ./:/workspace
    working_dir: /workspace
    restart: always


  langgraph-api:
    build:
      context: .
      dockerfile: ./langgraph-app/Dockerfile
    container_name: langgraph-api
    volumes:
      - ./langgraph-app:/app
      # Die Bridge und den Deep Researcher als Volumes einbinden (für Live-Updates)
      - ./langchain-bridge-repo/langchain_fastapi_chat_completion:/app/langchain_fastapi_chat_completion
      - ./local-deep-researcher-repo:/app/local_deep_researcher
    environment:
      # --- SUCHE (WICHTIG!) ---
      # Wenn wir Tavily nutzen (empfohlen für Qualität):
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      # Wenn wir nur DuckDuckGo nutzen, lassen wir das weg oder konfigurieren es hier.

      # --- MODELL-STEUERUNG ---
      - OPENAI_API_BASE=http://litellm:4000
      - OPENAI_API_KEY=any-string
    depends_on:
      - litellm
      - opencode-server
    restart: always


  # --- DEIN CUSTOM AGENT UI ---
  agent-custom-ui:
    build:
      context: ./agent-custom-ui
      dockerfile: Dockerfile
    container_name: agent-custom-ui
    ports:
      - "3001:3000"
    environment:
      # 1. Die ID deines Agenten (Standard ist meistens "agent")
      - NEXT_PUBLIC_ASSISTANT_ID=agent

      # 2. Wo liegt dein ECHTER Server im Docker-Netzwerk?
      - LANGGRAPH_API_URL=http://langgraph-api:8123

      # 3. Wie verbindet sich das Frontend mit seinem eigenen Proxy?
      # Bei Docker reicht hier meistens der relative Pfad "/api" oder "http://localhost:3001/api"
      - NEXT_PUBLIC_API_URL=/api

      # (Optional) Wenn du LangSmith zum Aufzeichnen der Agenten-Gedanken nutzt:
      # - LANGSMITH_API_KEY=dein_langsmith_key
    depends_on:
      - langgraph-api
    restart: always

  # --- LIBRECHAT (Das Gesicht) ---
  librechat:
    image: ghcr.io/danny-avila/librechat:latest
    container_name: librechat
    ports:
      - "3080:3080"
    depends_on:
      - mongodb
      - redis
      - litellm
    environment:
      - MONGO_URI=mongodb://mongodb:27017/LibreChat
      - REDIS_URL=redis://redis:6379
      - CONFIG_PATH=/app/librechat.yaml
      - RAG_API_URL=http://rag_api:8000
    volumes:
      - ./librechat.yaml:/app/librechat.yaml
      - ./librechat-data/images:/app/client/public/images
    restart: always


