model_list:
  # Small fallback model. Ollama's OpenAI-compatible /v1 API is used because
  # it responds quickly and avoids provider-specific Ollama hangs in LiteLLM.
  - model_name: edge-gemma
    litellm_params:
      model: os.environ/EDGE_GEMMA_LITELLM_MODEL
      api_base: os.environ/EDGE_GEMMA_API_BASE
      api_key: os.environ/LOCAL_LLM_API_KEY
      timeout: os.environ/EDGE_GEMMA_TIMEOUT_SECONDS
      stream_timeout: os.environ/EDGE_GEMMA_STREAM_TIMEOUT_SECONDS
      max_retries: 0

  # Main large model on the llama.cpp server.
  - model_name: big-boss
    litellm_params:
      model: os.environ/BIG_BOSS_LITELLM_MODEL
      api_base: os.environ/BIG_BOSS_API_BASE
      api_key: os.environ/LOCAL_LLM_API_KEY
      timeout: os.environ/BIG_BOSS_TIMEOUT_SECONDS
      stream_timeout: os.environ/BIG_BOSS_STREAM_TIMEOUT_SECONDS
      max_retries: 0

litellm_settings:
  num_retries: os.environ/LITELLM_NUM_RETRIES
  request_timeout: os.environ/LITELLM_REQUEST_TIMEOUT_SECONDS
